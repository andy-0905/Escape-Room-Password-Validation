<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Escape Room</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: auto;
      padding-top: 5px;
      background-color: #c5c5c5;
      text-align: center;
      font-size: 16px;
      color: black;
      align-items: center;
      margin-bottom: 10px;
      
    }
    .text-btn {
      background: none;
      border: none;
      padding: 0;
      color: black;
      cursor: pointer;
      font-size: 20px;
    }
    input, select {
      font-size: 16px;
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    .form {
      max-width: 600px;
      width:90%;
      align-items: center;
      margin: auto;
    }

    .row {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    label {
      text-align: right;
      margin-right: 10px;
    }

    @media (min-width: 600px) {
      .row {
        display: grid;
        flex-direction: row;
        grid-template-columns: 50% 1fr auto;
        gap: 5px;
        justify-content: center;
      }

      input {
        flex: 1;
        grid-template-columns: auto 1fr auto;
        margin-right: 10px;
      }

      button {
        padding: 8px 12px;
        grid-template-columns: auto 1fr auto;
        cursor: pointer;
        white-space: nowrap;
      }

    }
  </style>
</head>
<body>
  <script>
    let answers = {};
    let isLoaded = false;
    document.querySelectorAll("input, button").forEach(el => el.disabled = true);
    
    fetch("ans-12-Disciples.json")
    .then(res => res.json())
    .then(data => {
        answers = data;
        isLoaded = true;
        document.querySelectorAll("input, button").forEach(el => el.disabled = false);
    });
  </script>
  <header>
    <div class="form">
      <button id="home" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">Home</button>
      <button id="disciples" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation/12-Disciples'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">12 Disciples</button>
      <button id="input" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation/input'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">Input</button>
    </div>
  </header>
  <div class="container">
    <h1>Welcome to the Escape Room</h1>
    <button onclick="show()">Show answers</button>
    <div id="q1-section" style="display:block;">
      <h2>Question 1</h2>
      <input type="text" id="q1">
      <button onclick="checkAnswer(1)">Submit</button>
    </div>

    <div id="q2-section" style="display:none;">
      <h2>Question 2</h2>
      <input type="text" id="q2">
      <button onclick="checkAnswer(2)">Submit</button>
    </div>

    <div id="q3-section" style="display:none;">
      <h2>Question 3</h2>
      <input type="text" id="q3">
      <button onclick="checkAnswer(3)">Submit</button>
    </div>

    <div id="q4-section" style="display:none;">
      <h2>Question 4</h2>
      <input type="text" id="q4">
      <button onclick="checkAnswer(4)">Submit</button>
    </div>

    <div id="q5-section" style="display:none;">
      <h2>Question 5</h2>
      <input type="text" id="q5">
      <button onclick="checkAnswer(5)">Submit</button>
    </div>

    <div id="end-section" style="display:none;">
      <h2>You Have Escaped!</h2>
    </div>

    <script>

    function checkAnswer(num) {
    if (!isLoaded) {
        alert("Answers are still loading. Please try again in a moment.");
        return;
      }

      let userAnswer = document.getElementById("q" + num).value;
      let answer = answers["answer" + num]
      if (userAnswer.toLowerCase().trim() === answer.toLowerCase().trim()) {
        alert("Correct!");

      // unlock next question
        let curSection = document.getElementById("q" + (num) + "-section");
        curSection.style.display = "none";
        let nextSection = document.getElementById("q" + (num + 1) + "-section");
        if (nextSection) {
          nextSection.style.display = "block";
        } else {
          let endSection = document.getElementById("end-section");
          endSection.style.display = "block";
        }
      } else {
        alert("Wrong answer. Try again!");
      }
    }

    function show() {
      if (!isLoaded) {
        alert("Answers are still loading. Please try again in a moment.");
        return;
      }

      for (let i = 1; i <= 5; i++) {
        document.getElementById("output").innerHTML = answers["answer" + i]);
      }
    }

    function oncolor(id) {
      document.getElementById(id).style="color:green;";
    }

    function offcolour(id) {
      document.getElementById(id).style="color:black;"
    }
    </script>
  </div>
</body>
</html>
