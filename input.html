<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QR Code Generator</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: auto;
      padding-top: 5px;
      background-color: #c5c5c5;
      text-align: center;
      font-size: 16px;
      color: black;
      align-items: center;
      margin-bottom: 10px;
      
    }
    .text-btn {
      background: none;
      border: none;
      padding: 0;
      color: black;
      cursor: pointer;
      font-size: 20px;
    }
    input, select {
      font-size: 16px;
      padding: 10px;
      margin: 5px;
    }

    button {
      padding: 10px;
      font-size: 16px;
      cursor: pointer;
      margin: 5px;
    }

    .form {
      max-width: 600px;
      width:90%;
      align-items: center;
      margin: auto;
    }

    .row {
      display: flex;
      flex-direction: column;
      margin-bottom: 15px;
    }

    label {
      text-align: right;
      margin-right: 10px;
    }

    @media (min-width: 600px) {
      .row {
        display: grid;
        flex-direction: row;
        grid-template-columns: 50% 1fr auto;
        gap: 5px;
        justify-content: center;
      }

      input {
        flex: 1;
        grid-template-columns: auto 1fr auto;
        margin-right: 10px;
      }

      button {
        padding: 8px 12px;
        grid-template-columns: auto 1fr auto;
        cursor: pointer;
        white-space: nowrap;
      }

    }
  </style>
</head>
<body>
  <header>
    <div class="form">
      <button id="home" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">Home</button>
      <button id="disciples" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation/12-Disciples'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">12 Disciples</button>
      <button id="input" class="text-btn" onclick="window.location.href='https://andy-0905.github.io/Escape-Room-Password-Validation/input'" onmousemove="oncolor(id)" onmouseout="offcolour(id)">Input</button>
    </div>
  </header>
  <div class="container">
    <h1>Welcome to the Escape Room</h1>

    <div class="form">
      <div class="row">
        <input type="text" id="answer1" placeholder="Answer 1" size="40" required>
        <button onclick="saveAnswer(1)">Save Answer 1</button>
      </div>
      <div class="row">
        <input type="text" id="answer2" placeholder="Answer 2" size="40" required>
        <button onclick="saveAnswer(2)">Save Answer 2</button>
      </div>
      <div class="row">
        <input type="text" id="answer3" placeholder="Answer 3" size="40" required>
        <button onclick="saveAnswer(3)">Save Answer 3</button>
      </div>
      <div class="row">
        <input type="text" id="answer4" placeholder="Answer 4" size="40" required>
        <button onclick="saveAnswer(4)">Save Answer 4</button>
      </div>
      <div class="row">
        <input type="text" id="answer5" placeholder="Answer 5" size="40" required>
        <button onclick="saveAnswer(5)">Save Answer 5</button>
      </div>
    </div>

    <script>

    function saveAnswer(num) {
      let value = document.getElementById("answer" + num).value;
      localStorage.setItem("answer" + num, value);
      alert("Answer " + num + " saved!");
    }
      
    function show() {
      if (!isLoaded) {
        alert("Answers are still loading. Please try again in a moment.");
        return;
      }
      let DAnswer;
      for (let i = 1; i <= 5; i++) {
        DAnswer = localStorage.getItem("answer" + num);
        document.getElementById("output").innerHTML = DAnswer;
      }
    }
      
    function oncolor(id) {
      document.getElementById(id).style="color:green;";
    }

    function offcolour(id) {
      document.getElementById(id).style="color:black;"
    }

    </script>
  </div>
</body>
</html>
